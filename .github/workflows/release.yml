name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: resolve version
        id: ver
        shell: pwsh
        env:
          EVENT: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          $tag = if ($env:EVENT -eq 'workflow_dispatch') { $env:INPUT_TAG } else { $env:REF_NAME }
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: build
        run: cargo build --release

      - name: package
        shell: pwsh
        env:
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          New-Item -ItemType Directory dist | Out-Null
          Copy-Item target/release/boop.exe dist/
          Copy-Item target/release/stub.exe dist/
          Copy-Item LICENSE dist/
          Copy-Item ACKNOWLEDGEMENTS dist/
          $zip = "boop-$env:TAG-windows-x64.zip"
          Compress-Archive -Path dist/* -DestinationPath $zip
          (Get-FileHash $zip -Algorithm SHA256).Hash.ToLower() + "  $zip" | Out-File "$zip.sha256" -Encoding ascii

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          draft: true
          generate_release_notes: true
          files: |
            boop-*-windows-x64.zip
            boop-*-windows-x64.zip.sha256
